<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Coffee Day Cafe — Login</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: Arial, Helvetica, sans-serif;
      background: url('https://images.unsplash.com/photo-1509042239860-f550ce710b93')
                  no-repeat center/cover;
    }

    .card {
      background: rgba(255,255,255,0.95);
      border-radius: 12px;
      padding: 40px 36px;
      width: 360px;
      box-shadow: 0 8px 30px rgba(0,0,0,0.25);
    }

    h1 { color: #671215; text-align: center; margin-bottom: 6px; }
    .subtitle { text-align: center; color: #888; font-size: 14px; margin-bottom: 24px; }

    /* Tab switcher */
    .tabs { display: flex; margin-bottom: 24px; border-bottom: 2px solid #ddd; }
    .tab {
      flex: 1; text-align: center; padding: 10px;
      cursor: pointer; font-weight: bold; color: #888;
      border-bottom: 3px solid transparent; margin-bottom: -2px;
      transition: color .2s, border-color .2s;
    }
    .tab.active { color: #671215; border-bottom-color: #671215; }

    label { display: block; font-size: 13px; color: #555; margin-bottom: 4px; margin-top: 14px; }
    input {
      width: 100%; padding: 10px 12px; border: 1px solid #ccc;
      border-radius: 6px; font-size: 14px; outline: none;
      transition: border-color .2s;
    }
    input:focus { border-color: #671215; }

    button.submit-btn {
      width: 100%; padding: 12px; margin-top: 22px;
      background: #671215; color: white; border: none;
      border-radius: 6px; font-size: 15px; font-weight: bold;
      cursor: pointer; transition: background .2s;
    }
    button.submit-btn:hover { background: #4b091e; }

    .msg {
      margin-top: 14px; padding: 10px; border-radius: 6px;
      font-size: 13px; text-align: center; display: none;
    }
    .msg.success { background: #d4edda; color: #155724; }
    .msg.error   { background: #f8d7da; color: #721c24; }

    .form-section { display: none; }
    .form-section.active { display: block; }
  </style>
</head>
<body>

<div class="card">
  <h1>☕ Coffee Day</h1>
  <p class="subtitle">Sign in or create an account</p>

  <!-- Tabs -->
  <div class="tabs">
    <div class="tab active" onclick="switchTab('login')">Login</div>
    <div class="tab"        onclick="switchTab('register')">Register</div>
  </div>

  <!-- LOGIN FORM -->
  <div class="form-section active" id="login-section">
    <label>Email</label>
    <input type="email" id="login-email" placeholder="you@example.com" required />

    <label>Password</label>
    <input type="password" id="login-password" placeholder="••••••" required />

    <button class="submit-btn" onclick="handleLogin()">Login</button>
    <div class="msg" id="login-msg"></div>
  </div>

  <!-- REGISTER FORM -->
  <div class="form-section" id="register-section">
    <label>Name</label>
    <input type="text" id="reg-name" placeholder="Your name" required />

    <label>Email</label>
    <input type="email" id="reg-email" placeholder="you@example.com" required />

    <label>Password <small>(min 6 characters)</small></label>
    <input type="password" id="reg-password" placeholder="••••••" required />

    <button class="submit-btn" onclick="handleRegister()">Create Account</button>
    <div class="msg" id="register-msg"></div>
  </div>
</div>

<script>
  // ── Tab switching ────────────────────────────────────────────────────────
  function switchTab(tab) {
    document.querySelectorAll('.tab').forEach((t, i) => {
      t.classList.toggle('active', (i === 0 && tab === 'login') || (i === 1 && tab === 'register'));
    });
    document.getElementById('login-section').classList.toggle('active', tab === 'login');
    document.getElementById('register-section').classList.toggle('active', tab === 'register');
  }

  // ── Show message helper ──────────────────────────────────────────────────
  function showMsg(id, text, type) {
    const el = document.getElementById(id);
    el.textContent = text;
    el.className = `msg ${type}`;
    el.style.display = 'block';
  }

  // ── Login ────────────────────────────────────────────────────────────────
  async function handleLogin() {
    const email    = document.getElementById('login-email').value.trim();
    const password = document.getElementById('login-password').value;

    if (!email || !password) {
      return showMsg('login-msg', 'Please fill in all fields.', 'error');
    }

    try {
      const res  = await fetch('/api/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password }),
        credentials: 'include'
      });
      const data = await res.json();

      if (data.success) {
        showMsg('login-msg', data.message, 'success');
        setTimeout(() => window.location.href = 'new.html', 1000);
      } else {
        showMsg('login-msg', data.message, 'error');
      }
    } catch {
      showMsg('login-msg', 'Server error. Make sure the backend is running.', 'error');
    }
  }

  // ── Register ─────────────────────────────────────────────────────────────
  async function handleRegister() {
    const username = document.getElementById('reg-name').value.trim();
    const email    = document.getElementById('reg-email').value.trim();
    const password = document.getElementById('reg-password').value;

    if (!username || !email || !password) {
      return showMsg('register-msg', 'Please fill in all fields.', 'error');
    }

    try {
      const res  = await fetch('/api/register', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, email, password }),
        credentials: 'include'
      });
      const data = await res.json();

      if (data.success) {
        showMsg('register-msg', data.message, 'success');
        setTimeout(() => switchTab('login'), 1500);
      } else {
        showMsg('register-msg', data.message, 'error');
      }
    } catch {
      showMsg('register-msg', 'Server error. Make sure the backend is running.', 'error');
    }
  }

  // Allow Enter key to submit
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') {
      const active = document.querySelector('.form-section.active').id;
      active === 'login-section' ? handleLogin() : handleRegister();
    }
  });
</script>

</body>
</html>
